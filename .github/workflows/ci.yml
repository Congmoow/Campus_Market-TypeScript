name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: campus_market
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d campus_market"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/campus_market?schema=public
      JWT_SECRET: codex-ci-jwt-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Prepare backend test database
        run: npm --workspace campus-market-backend run prisma:push

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build
