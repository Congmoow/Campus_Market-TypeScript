name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  code-level-tests:
    runs-on: ubuntu-latest
    env:
      CI: true
      JWT_SECRET: codex-ci-jwt-secret
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Make CI scripts executable
        run: chmod +x scripts/ci/setup-node20.sh scripts/ci/run-code-tests.sh

      - name: Run code-level tests
        run: bash scripts/ci/run-code-tests.sh

      - name: Upload code-level test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-level-test-artifacts
          if-no-files-found: warn
          path: |
            reports/code-level-tests-summary.txt
            reports/backend
            reports/frontend

  customer-regression:
    needs: code-level-tests
    runs-on: ubuntu-latest
    env:
      CI: true
      JWT_SECRET: codex-ci-jwt-secret
      DOCKER_ACCEPTANCE_FRONTEND_URL: http://localhost
      DOCKER_ACCEPTANCE_BACKEND_URL: http://localhost:3000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Make CI scripts executable
        run: chmod +x scripts/ci/setup-node20.sh scripts/ci/run-docker-acceptance.sh

      - name: Run customer regression
        run: bash scripts/ci/run-docker-acceptance.sh

      - name: Upload customer regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-regression-artifacts
          if-no-files-found: warn
          path: |
            reports/acceptance
            reports/docker
            reports/acceptance-report.json
            reports/acceptance-summary.md
            reports/docker-compose.log
